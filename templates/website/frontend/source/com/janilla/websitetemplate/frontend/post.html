<main>
  <article class="hero" style='background-image: url("${heroImage.uri}")'>
    <div></div>
    <section>
      <div>
        <h1>${title}</h1>
        <!--${metadata}-->
      </div>
    </section>
  </article>
  <div>
    <!--${content}-->
    <div class="cards">
      <!--${cards}-->
    </div>
  </div>
</main>

<template id="metadata">
  <dl>
    <!--${items}-->
  </dl>
</template>

<template id="metadatum">
  <div>
    <dt>${term}</dt>
    <dd>
      <!--${description}-->
    </dd>
  </div>
</template>

<template id="date">
  <time datetime="${value}">
    <intl-format data-type="date" data-value="${value}"></intl-format>
  </time>
</template>

<template id="banner">
  <banner-element data-path="${path}"></banner-element>
</template>

<template id="rich-text">
  <rich-text data-path="${path}"></rich-text>
</template>

<template id="media-block">
  <media-block data-path="${path}"></media-block>
</template>

<template id="card">
  <card-element data-slug="${slug}"></card-element>
</template>
